client_id = "4801d24015598934b6c447731cbac1a6"
name = "DelayRadar"
application_url = "https://delayradar.vercel.app"
embedded = true
handle = "delayradar"

[build]
automatically_update_urls_on_dev = true

[access_scopes]
scopes = "read_orders,read_fulfillments"

[auth]
redirect_urls = [
  "https://delayradar.vercel.app/auth/callback",
  "https://delayradar.vercel.app/api/auth/callback"
]

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/api/webhooks/shopify"

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/api/webhooks/shopify"

  [[webhooks.subscriptions]]
  topics = ["fulfillments/create"]
  uri = "/api/webhooks/shopify"

  [[webhooks.subscriptions]]
  topics = ["fulfillments/update"]
  uri = "/api/webhooks/shopify"

[webhooks.privacy_compliance]
  customer_data_request_url = "https://delayradar.vercel.app/api/webhooks/shopify"
  customer_deletion_url = "https://delayradar.vercel.app/api/webhooks/shopify"
  shop_deletion_url = "https://delayradar.vercel.app/api/webhooks/shopify"
